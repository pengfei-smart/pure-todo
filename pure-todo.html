<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Pure To Do</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --fg: #111111;
      --fg-muted: #666666;
      --accent: #007aff;
      --border: #e0e0e0;
      --card-bg: #ffffff;
      --completed: #9e9e9e;
      --danger: #ff3b30;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --fg: #f5f5f7;
        --fg-muted: #999999;
        --accent: #0a84ff;
        --border: #333333;
        --card-bg: #1c1c1e;
        --completed: #5e5e5e;
        --danger: #ff453a;
      }
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: radial-gradient(circle at top left, #e3f2fd 0, var(--bg) 40%, var(--bg) 100%);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    /* 整体容器：大屏左右两张卡片居中；小屏上下堆叠 */
    .app {
      width: 100%;
      max-width: 1100px; /* 整体宽度，类似你截图红框的宽度 */
      margin: 0 auto;
      padding: 24px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }
    @media (min-width: 840px) {
      .app {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center; /* 左右两张卡片整体居中 */
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.8);
      padding: 18px 16px 14px;
    }
    @media (prefers-color-scheme: dark) {
      .card {
        background: rgba(18, 18, 19, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
      }
    }

    /* 左右两张卡片宽度：大屏固定大致 480px，小屏铺满 */
    .card-main,
    .card-log {
      width: 100%;
      max-width: 520px; /* 单卡片最大宽度 */
      flex: 0 0 auto;
    }
    @media (min-width: 840px) {
      .card-main {
        margin-right: 8px;
      }
      .card-log {
        margin-left: 8px;
      }
    }
    @media (max-width: 839px) {
      .card-main,
      .card-log {
        max-width: none;
      }
      .card-log {
        margin-top: 8px;
      }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 12px;
      color: var(--fg-muted);
      user-select: none;
      -webkit-user-select: none;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 4px 0 0;
      max-height: calc(100vh - 260px);
      overflow-y: auto;
    }
    .item {
      padding: 6px 4px 6px 0;
      border-radius: 10px;
      transition: background 0.12s ease-out, transform 0.08s ease-out;
    }
    .item + .item {
      border-top: 1px solid rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      .item + .item {
        border-top: 1px solid rgba(255,255,255,0.04);
      }
    }
    .item.dragging {
      opacity: 0.9;
      transform: scale(1.01);
      background: rgba(0, 0, 0, 0.04);
    }
    @media (prefers-color-scheme: dark) {
      .item.dragging {
        background: rgba(255,255,255,0.08);
      }
    }

    /* 主行：勾选 + 文本 + 按钮 */
    .item-main {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      transition: background 0.12s ease-out, border-color 0.12s ease-out;
    }
    @media (prefers-color-scheme: dark) {
      .checkbox {
        background: rgba(0, 0, 0, 0.4);
      }
    }
    .checkbox-inner {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: transparent;
      transition: background 0.12s ease-out, transform 0.08s ease-out;
    }
    .item.completed .checkbox {
      border-color: var(--accent);
      background: var(--accent);
    }
    .item.completed .checkbox-inner {
      background: #ffffff;
      transform: scale(0.9);
    }

    .text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      cursor: text;              /* 鼠标变成文本光标，表示可编辑 */
      word-break: break-word;
      white-space: pre-wrap;     /* 保留换行 */
    }
    .item.completed .text {
      color: var(--completed);
      text-decoration: line-through;
    }
    .text.editing {
      outline: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 3px;
      background: rgba(0, 122, 255, 0.04);
    }

    .item-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
    }
    .icon-btn:hover {
      background: rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      .icon-btn:hover {
        background: rgba(255,255,255,0.08);
      }
    }
    .icon-note.has-note {
      color: var(--accent);
    }

    .delete-btn {
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      margin-left: 2px;
      border-radius: 999px;
      font-size: 14px;
      line-height: 1;
    }
    .delete-btn:hover {
      color: var(--danger);
      background: rgba(255, 59, 48, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      .delete-btn:hover {
        background: rgba(255, 69, 58, 0.16);
      }
    }

    .handle {
      width: 18px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--fg-muted);
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-size: 16px;
      padding-right: 2px;
    }
    .handle::before {
      content: "⋮⋮";
      letter-spacing: -1px;
    }

    /* 下方：时间 + 备注缩略 */
    .item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
      padding-left: 28px; /* 给勾选框留空 */
      font-size: 11px;
      color: var(--fg-muted);
    }
    .meta-time {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }
    .meta-note {
      text-align: right;
      max-width: 30%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer; /* 可以点开大备注框 */
    }
    .meta-note span {
      vertical-align: middle;
    }

    .empty {
      padding: 6px 4px 10px;
      color: var(--fg-muted);
      font-size: 14px;
      user-select: none;
      -webkit-user-select: none;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 8px 14px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.96);
      color: var(--fg);
    }
    @media (prefers-color-scheme: dark) {
      .input {
        background: rgba(0, 0, 0, 0.5);
      }
    }
    .btn {
      border-radius: 999px;
      border: none;
      font-size: 14px;
      padding: 8px 14px;
      cursor: pointer;
      white-space: nowrap;
      background: var(--accent);
      color: #ffffff;
    }
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding: 0 2px;
      gap: 8px;
    }
    .meta {
      font-size: 11px;
      text-align: center;
      color: var(--fg-muted);
      margin-top: 4px;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 右侧划线记录列表 */
    .log-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .log-list {
      list-style: none;
      margin: 8px 0 0;
      padding: 0;
      max-height: calc(100vh - 260px);
      overflow-y: auto;
    }
    .log-item {
      padding: 6px 2px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      .log-item {
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
    }
    .log-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .log-text {
      font-size: 13px;
      line-height: 1.4;
      color: var(--completed);
      text-decoration: line-through;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-time {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 2px;
    }

    /* 备注大弹窗 */
    .note-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .note-modal {
      width: 90%;
      max-width: 520px;
      max-height: 80vh;
      background: var(--card-bg);
      color: var(--fg);
      border-radius: 14px;
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.12);
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .note-modal-header {
      font-size: 14px;
      font-weight: 600;
    }
    .note-modal-time {
      font-size: 11px;
      color: var(--fg-muted);
    }
    .note-modal-textarea {
      width: 100%;
      min-height: 120px;
      max-height: 50vh;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      background: rgba(255, 255, 255, 0.96);
      color: var(--fg);
      box-sizing: border-box;
    }
    @media (prefers-color-scheme: dark) {
      .note-modal-textarea {
        background: rgba(0, 0, 0, 0.55);
      }
    }
    .note-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-secondary {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg-muted);
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .btn-primary {
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="app">
    <!-- 左侧：未划线任务 -->
    <section class="card card-main">
      <header class="header">
        <div>
          <div class="title">Pure To Do</div>
          <div class="subtitle">左：未划线任务 · 原地多行编辑 / 备注 / 拖拽</div>
        </div>
      </header>

      <ul id="todo-list" class="list"></ul>
      <div id="empty-state" class="empty">
        目前没有未划线任务。
      </div>

      <form id="add-form" class="input-row" autocomplete="off">
        <input
          id="new-task-input"
          class="input"
          type="text"
          placeholder="写下要做的事，然后回车或点「添加」…"
        />
        <button type="submit" class="btn">添加</button>
      </form>

      <div class="footer-row">
        <div class="subtitle" id="task-stats"></div>
      </div>
    </section>

    <!-- 右侧：划线记录 -->
    <section class="card card-log">
      <header class="header">
        <div>
          <div class="title" style="font-size:18px;">划线记录</div>
          <div class="subtitle">右：已划线任务 · 按划线时间排序 · 可撤销</div>
        </div>
        <div class="log-header-actions">
          <button type="button" class="icon-btn" id="toggle-log-btn" title="折叠 / 展开划线记录">
            ▾ 折叠
          </button>
        </div>
      </header>
      <ul id="completed-log" class="log-list"></ul>
    </section>

    <div class="meta">
      <span>GitHub 云端同步 · 本地备份 · 左未划线 / 右划线记录 · 创建 / 修改 / 划线时间 · 备注弹窗</span>
    </div>
  </main>

  <!-- 备注大弹窗 -->
  <div id="note-modal-backdrop" class="note-modal-backdrop" style="display:none;">
    <div class="note-modal" id="note-modal">
      <div class="note-modal-header">备注</div>
      <div class="note-modal-time" id="note-modal-time"></div>
      <textarea
        id="note-modal-textarea"
        class="note-modal-textarea"
        placeholder="在这里编写或修改这条任务的备注（可多行）…"
      ></textarea>
      <div class="note-modal-footer">
        <button type="button" class="btn-secondary" id="note-modal-cancel">取消</button>
        <button type="button" class="btn-primary" id="note-modal-save">保存</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // ===== 1. GitHub 仓库配置 =====
      var GH_OWNER = "pengfei-smart";
      var GH_REPO  = "pure-todo";
      var GH_PATH  = "tasks.json";

      var TOKEN_STORAGE_KEY    = "pure_todo_github_token";
      var LOCAL_BACKUP_KEY     = "pure_todo_github_backup_v6";
      var LOG_COLLAPSE_KEY     = "pure_todo_log_collapsed_v1";
      var GITHUB_TOKEN         = "";
      var logCollapsed         = false;

      // 任务结构：
      // { id, text, completed, createdAt, updatedAt, note, completedAt }
      var tasks = [];
      var currentSha = null;

      var listEl  = document.getElementById("todo-list");
      var emptyEl = document.getElementById("empty-state");
      var formEl  = document.getElementById("add-form");
      var inputEl = document.getElementById("new-task-input");
      var statsEl = document.getElementById("task-stats");
      var completedLogEl = document.getElementById("completed-log");
      var toggleLogBtn = document.getElementById("toggle-log-btn");

      // 备注弹窗
      var noteModalBackdrop  = document.getElementById("note-modal-backdrop");
      var noteModalTextarea  = document.getElementById("note-modal-textarea");
      var noteModalTime      = document.getElementById("note-modal-time");
      var noteModalSaveBtn   = document.getElementById("note-modal-save");
      var noteModalCancelBtn = document.getElementById("note-modal-cancel");
      var currentNoteTaskId  = null;

      // ===== 2. 补全老数据的字段 =====
      function normalizeTasks() {
        var now = Date.now();
        for (var i = 0; i < tasks.length; i++) {
          var t = tasks[i];
          if (!t) continue;
          if (!t.id) {
            t.id = now.toString() + Math.random().toString(16).slice(2);
          }
          if (typeof t.completed !== "boolean") {
            t.completed = !!t.completed;
          }
          if (typeof t.createdAt !== "number") {
            t.createdAt = now;
          }
          if (typeof t.updatedAt !== "number") {
            t.updatedAt = t.createdAt;
          }
          if (typeof t.note !== "string") {
            t.note = "";
          }
          if (typeof t.completedAt !== "number" && t.completed) {
            t.completedAt = t.updatedAt || now;
          }
          if (!t.completed) {
            t.completedAt = null;
          }
        }
      }

      function pad2(n) {
        return n < 10 ? "0" + n : "" + n;
      }

      function formatTime(ts) {
        if (!ts) return "";
        var d = new Date(ts);
        var y = d.getFullYear();
        var m = pad2(d.getMonth() + 1);
        var day = pad2(d.getDate());
        var h = pad2(d.getHours());
        var min = pad2(d.getMinutes());
        return y + "-" + m + "-" + day + " " + h + ":" + min;
      }

      // ===== 3. 本地备份 =====
      function loadFromLocalBackup() {
        try {
          var raw = localStorage.getItem(LOCAL_BACKUP_KEY);
          if (raw) {
            var parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              tasks = parsed;
            }
          }
        } catch (e) {
          tasks = [];
        }
        normalizeTasks();
      }

      function saveToLocalBackup() {
        try {
          localStorage.setItem(LOCAL_BACKUP_KEY, JSON.stringify(tasks));
        } catch (e) {}
      }

      // ===== 4. GitHub Token / 工具函数 =====
      function ensureToken() {
        if (GITHUB_TOKEN) return true;
        try {
          var stored = localStorage.getItem(TOKEN_STORAGE_KEY);
          if (stored && stored.trim()) {
            GITHUB_TOKEN = stored.trim();
            return true;
          }
        } catch (e) {}

        var t = window.prompt(
          "第一次使用云同步，请粘贴你在 GitHub 创建的 Personal Access Token：\n\n" +
          "说明：\n" +
          "1. 这个 Token 只会保存在本机浏览器的 localStorage 中，不会上传到任何服务器；\n" +
          "2. 如果不想用云同步，可以直接点取消，只使用本地存储。"
        );
        if (t && t.trim()) {
          GITHUB_TOKEN = t.trim();
          try {
            localStorage.setItem(TOKEN_STORAGE_KEY, GITHUB_TOKEN);
          } catch (e) {}
          return true;
        } else {
          console.warn("未配置 GitHub Token，将只使用本地存储。");
          return false;
        }
      }

      function githubHeaders() {
        if (!ensureToken()) {
          return {
            "Accept": "application/vnd.github.v3+json"
          };
        }
        return {
          "Content-Type": "application/json",
          "Accept": "application/vnd.github.v3+json",
          "Authorization": "Bearer " + GITHUB_TOKEN
        };
      }

      function encodeBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      function decodeBase64(str) {
        return decodeURIComponent(escape(atob(str)));
      }

      // ===== 5. 从 GitHub 读写 tasks.json =====
      function loadFromGitHub() {
        if (!ensureToken()) {
          return Promise.reject(new Error("NO_TOKEN"));
        }
        var url = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + GH_PATH;

        return fetch(url, { headers: githubHeaders() })
          .then(function (res) {
            if (res.status === 404) {
              currentSha = null;
              tasks = [];
              normalizeTasks();
              return null;
            }
            if (!res.ok) {
              return res.json().catch(function () { return {}; }).then(function (body) {
                var err = new Error("HTTP " + res.status);
                err.status = res.status;
                err.body = body;
                throw err;
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (!data) return;
            currentSha = data.sha;
            if (!data.content) {
              tasks = [];
              normalizeTasks();
              return;
            }
            var decoded = decodeBase64(data.content);
            var parsed = JSON.parse(decoded);
            if (parsed && Array.isArray(parsed.list)) {
              tasks = parsed.list;
            } else {
              tasks = [];
            }
            normalizeTasks();
          });
      }

      function saveToGitHub() {
        if (!ensureToken()) {
          console.warn("未配置 GitHub Token，只保存到本地。");
          return;
        }
        var url = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + GH_PATH;
        var text = JSON.stringify({ list: tasks }, null, 2);
        var content = encodeBase64(text);

        var body = {
          message: "Update tasks via Pure To Do - " + new Date().toISOString(),
          content: content
        };
        if (currentSha) {
          body.sha = currentSha;
        }

        return fetch(url, {
          method: "PUT",
          headers: githubHeaders(),
          body: JSON.stringify(body)
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().catch(function () { return {}; }).then(function (body) {
                var err = new Error("HTTP " + res.status);
                err.status = res.status;
                err.body = body;
                throw err;
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (data && data.content && data.content.sha) {
              currentSha = data.content.sha;
            }
          })
          .catch(function (e) {
            console.warn("保存到 GitHub 失败，仅本地保存：", e);
          });
      }

      var saveTimer = null;
      function saveAll() {
        saveToLocalBackup();
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(function () {
          saveToGitHub();
        }, 800);
      }

      // ===== 6. 渲染 =====
      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function render() {
        listEl.innerHTML = "";
        completedLogEl.innerHTML = "";

        var active = [];
        var completedForLog = [];

        for (var i = 0; i < tasks.length; i++) {
          var t = tasks[i];
          if (!t) continue;
          if (t.completed) {
            completedForLog.push(t);
          } else {
            active.push(t);
          }
        }

        if (active.length === 0) {
          emptyEl.style.display = "block";
        } else {
          emptyEl.style.display = "none";
        }

        // 左侧：未划线任务
        for (var ai = 0; ai < active.length; ai++) {
          (function (task) {
            var li = document.createElement("li");
            li.className = "item";
            li.draggable = true;
            li.dataset.id = task.id;

            var mainRow = document.createElement("div");
            mainRow.className = "item-main";

            var checkbox = document.createElement("div");
            checkbox.className = "checkbox";
            checkbox.innerHTML = '<div class="checkbox-inner"></div>';
            checkbox.addEventListener("click", function () {
              toggle(task.id);
            });

            var text = document.createElement("div");
            text.className = "text";
            text.textContent = task.text;
            text.title = "点击直接编辑内容（可多行）";
            text.contentEditable = "true";
            text.spellcheck = false;

            text.addEventListener("focus", function () {
              text.classList.add("editing");
              text._originalText = task.text || "";
            });

            text.addEventListener("blur", function () {
              text.classList.remove("editing");
              var original = text._originalText != null ? text._originalText : (task.text || "");
              var newText = text.innerText.replace(/\r\n/g, "\n").trim();

              if (!newText) {
                text.textContent = original;
                return;
              }
              if (newText === original) return;

              task.text = newText;
              task.updatedAt = Date.now();
              saveAll();
              render();
            });

            text.addEventListener("keydown", function (e) {
              if (e.key === "Escape") {
                e.preventDefault();
                var original = text._originalText != null ? text._originalText : (task.text || "");
                text.textContent = original;
                text.blur();
              }
            });

            var actions = document.createElement("div");
            actions.className = "item-actions";

            var copyBtn = document.createElement("button");
            copyBtn.className = "icon-btn";
            copyBtn.textContent = "复制";
            copyBtn.title = "复制内容到剪贴板";
            copyBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              copyTask(task);
            });

            var noteBtn = document.createElement("button");
            noteBtn.className = "icon-btn icon-note" + (task.note ? "has-note" : "");
            noteBtn.textContent = "注";
            noteBtn.title = task.note ? "查看 / 修改备注" : "添加备注";
            noteBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              openNoteModal(task.id);
            });

            var handle = document.createElement("div");
            handle.className = "handle";

            var del = document.createElement("button");
            del.className = "delete-btn";
            del.textContent = "✕";
            del.title = "彻底删除这条任务";
            del.addEventListener("click", function (e) {
              e.stopPropagation();
              var ok = confirm("确定要真正删除这条任务吗？（不会出现在划线记录中）\n\n" + task.text);
              if (ok) deleteTask(task.id);
            });

            actions.appendChild(copyBtn);
            actions.appendChild(noteBtn);
            actions.appendChild(handle);
            actions.appendChild(del);

            mainRow.appendChild(checkbox);
            mainRow.appendChild(text);
            mainRow.appendChild(actions);

            var metaRow = document.createElement("div");
            metaRow.className = "item-meta";

            var metaTime = document.createElement("div");
            metaTime.className = "meta-time";
            var createdStr = formatTime(task.createdAt);
            var updatedStr = formatTime(task.updatedAt);
            var timeText = "创建：" + createdStr;
            if (task.updatedAt && task.updatedAt !== task.createdAt) {
              timeText += " · 修改：" + updatedStr;
            }
            metaTime.textContent = timeText;

            var metaNote = document.createElement("div");
            metaNote.className = "meta-note";
            if (task.note) {
              var preview = task.note;
              if (preview.length > 12) {
                preview = preview.slice(0, 12) + "…";
              }
              metaNote.innerHTML = '<span>📝 ' + escapeHtml(preview) + "</span>";
            } else {
              metaNote.textContent = "";
            }
            metaNote.addEventListener("click", function (e) {
              e.stopPropagation();
              openNoteModal(task.id);
            });

            metaRow.appendChild(metaTime);
            metaRow.appendChild(metaNote);

            li.appendChild(mainRow);
            li.appendChild(metaRow);

            li.addEventListener("dragstart", function (e) {
              e.dataTransfer.effectAllowed = "move";
              e.dataTransfer.setData("text/plain", task.id);
              li.classList.add("dragging");
            });
            li.addEventListener("dragend", function () {
              li.classList.remove("dragging");
            });
            li.addEventListener("dragover", function (e) {
              e.preventDefault();
            });
            li.addEventListener("drop", function (e) {
              e.preventDefault();
              var fromId = e.dataTransfer.getData("text/plain");
              if (!fromId || fromId === task.id) return;
              reorder(fromId, task.id);
            });

            listEl.appendChild(li);
          })(active[ai]);
        }

        // 右侧：划线记录
        completedForLog.sort(function(a, b) {
          return (b.completedAt || 0) - (a.completedAt || 0);
        }).reverse();

        if (completedForLog.length === 0) {
          var emptyLog = document.createElement("li");
          emptyLog.className = "log-item";
          var t = document.createElement("div");
          t.className = "log-time";
          t.textContent = "目前还没有划线记录。";
          emptyLog.appendChild(t);
          completedLogEl.appendChild(emptyLog);
        } else {
          for (var ci = 0; ci < completedForLog.length; ci++) {
            (function(ct){
              var logLi = document.createElement("li");
              logLi.className = "log-item";

              var logMain = document.createElement("div");
              logMain.className = "log-main";

              var logText = document.createElement("div");
              logText.className = "log-text";
              logText.textContent = ct.text;

              var undoBtn = document.createElement("button");
              undoBtn.className = "icon-btn";
              undoBtn.textContent = "撤销";
              undoBtn.title = "取消划线，恢复到左侧";
              undoBtn.addEventListener("click", function (e) {
                e.stopPropagation();
                toggle(ct.id);
              });

              logMain.appendChild(logText);
              logMain.appendChild(undoBtn);

              var logTime = document.createElement("div");
              logTime.className = "log-time";
              logTime.textContent = "划线时间：" + formatTime(ct.completedAt);

              logLi.appendChild(logMain);
              logLi.appendChild(logTime);
              completedLogEl.appendChild(logLi);
            })(completedForLog[ci]);
          }
        }

        var total = tasks.length;
        var done  = completedForLog.length;
        var activeCount = active.length;
        if (total === 0) {
          statsEl.textContent = "";
        } else {
          statsEl.textContent =
            "共 " + total + " 条 · 已划线 " + done + " 条 · 未划线 " + activeCount + " 条";
        }

        updateLogDisplay();
      }

      function updateLogDisplay() {
        if (logCollapsed) {
          completedLogEl.style.display = "none";
          toggleLogBtn.textContent = "▸ 展开";
        } else {
          completedLogEl.style.display = "";
          toggleLogBtn.textContent = "▾ 折叠";
        }
      }

      // ===== 7. 任务操作 =====
      function add(text) {
        var t = text.trim();
        if (!t) return;
        var now = Date.now();
        tasks.unshift({
          id: now.toString() + Math.random().toString(16).slice(2),
          text: t,
          completed: false,
          createdAt: now,
          updatedAt: now,
          note: "",
          completedAt: null
        });
        saveAll();
        render();
      }

      function findTaskIndex(id) {
        for (var i = 0; i < tasks.length; i++) {
          if (tasks[i].id === id) return i;
        }
        return -1;
      }

      function toggle(id) {
        var i = findTaskIndex(id);
        if (i === -1) return;
        var t = tasks[i];
        var now = Date.now();
        if (!t.completed) {
          t.completed = true;
          t.completedAt = now;
        } else {
          t.completed = false;
          t.completedAt = null;
        }
        t.updatedAt = now;
        saveAll();
        render();
      }

      // 备注弹窗
      function openNoteModal(id) {
        var i = findTaskIndex(id);
        if (i === -1) return;
        var task = tasks[i];
        currentNoteTaskId = id;

        noteModalTextarea.value = task.note || "";

        var createdStr = formatTime(task.createdAt);
        var updatedStr = formatTime(task.updatedAt);
        var timeText = "创建时间：" + createdStr;
        if (task.updatedAt && task.updatedAt !== task.createdAt) {
          timeText += " · 最后修改：" + updatedStr;
        }
        noteModalTime.textContent = timeText;

        noteModalBackdrop.style.display = "flex";
        noteModalTextarea.focus();
        noteModalTextarea.selectionStart = noteModalTextarea.selectionEnd = noteModalTextarea.value.length;
      }

      function closeNoteModal(save) {
        if (!currentNoteTaskId) {
          noteModalBackdrop.style.display = "none";
          return;
        }
        var i = findTaskIndex(currentNoteTaskId);
        if (i !== -1 && save) {
          var next = noteModalTextarea.value;
          tasks[i].note = next.trim();
          tasks[i].updatedAt = Date.now();
          saveAll();
          render();
        }
        currentNoteTaskId = null;
        noteModalBackdrop.style.display = "none";
      }

      function copyTask(task) {
        var content = task.text || "";
        if (task.note) {
          content += "\n\n备注：" + task.note;
        }

        function fallbackCopy() {
          var ta = document.createElement("textarea");
          ta.value = content;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try {
            document.execCommand("copy");
            alert("已复制到剪贴板。");
          } catch (e) {
            alert("复制失败，可以手动选中内容复制。\n\n" + content);
          }
          document.body.removeChild(ta);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(content)
            .then(function () {
              alert("已复制到剪贴板。");
            })
            .catch(function () {
              fallbackCopy();
            });
        } else {
          fallbackCopy();
        }
      }

      function reorder(fromId, toId) {
        var fromIndex = findTaskIndex(fromId);
        var toIndex = findTaskIndex(toId);
        if (fromIndex === -1 || toIndex === -1) return;
        if (fromIndex === toIndex) return;
        var moved = tasks.splice(fromIndex, 1)[0];
        tasks.splice(toIndex, 0, moved);
        saveAll();
        render();
      }

      function deleteTask(id) {
        var i = findTaskIndex(id);
        if (i === -1) return;
        tasks.splice(i, 1);
        saveAll();
        render();
      }

      // ===== 8. 备注弹窗 & 折叠按钮事件 =====
      noteModalSaveBtn.addEventListener("click", function () {
        closeNoteModal(true);
      });
      noteModalCancelBtn.addEventListener("click", function () {
        closeNoteModal(false);
      });
      noteModalBackdrop.addEventListener("click", function (e) {
        if (e.target === noteModalBackdrop) {
          closeNoteModal(false);
        }
      });
      window.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && noteModalBackdrop.style.display === "flex") {
          e.preventDefault();
          closeNoteModal(false);
        }
      });

      toggleLogBtn.addEventListener("click", function () {
        logCollapsed = !logCollapsed;
        try {
          localStorage.setItem(LOG_COLLAPSE_KEY, logCollapsed ? "1" : "0");
        } catch (e) {}
        updateLogDisplay();
      });

      // ===== 9. 表单 & 初始化 =====
      formEl.addEventListener("submit", function (e) {
        e.preventDefault();
        add(inputEl.value);
        inputEl.value = "";
        inputEl.focus();
      });

      (function init() {
        // 读取折叠状态
        try {
          var lc = localStorage.getItem(LOG_COLLAPSE_KEY);
          logCollapsed = lc === "1";
        } catch (e) {
          logCollapsed = false;
        }

        loadFromGitHub()
          .then(function () {
            saveToLocalBackup();
          })
          .catch(function (e) {
            if (e && e.message === "NO_TOKEN") {
              loadFromLocalBackup();
            } else {
              console.warn("从 GitHub 加载失败，使用本地备份：", e);
              loadFromLocalBackup();
            }
          })
          .finally(function () {
            render();
            if (inputEl) inputEl.focus();
          });
      })();
    })();
  </script>
</body>
</html>
